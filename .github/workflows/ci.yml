name: ci

on:
  push:
  pull_request:

jobs:
  script-smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run root script smoke tests
        run: make test-scripts

  broker-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run broker api tests
        working-directory: solace-broker-api
        run: mvn test

      - name: Build broker api
        run: make build-api

  publisher-ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: solace-publisher-ui/package-lock.json

      - name: Install publisher ui dependencies
        working-directory: solace-publisher-ui
        run: npm ci

      - name: Run publisher ui tests
        working-directory: solace-publisher-ui
        run: npm test -- --run

      - name: Build publisher ui
        run: make build-ui

  subscriber-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run subscriber tests
        working-directory: solace-subscriber
        run: mvn test

      - name: Build subscriber
        run: make build-subscriber

  docker-release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker runtime images
        run: make docker-build-all

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Docker runtime images
        run: make docker-scan
